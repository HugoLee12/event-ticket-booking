name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  MSSQL_SA_PASSWORD: CI!Passw0rd123
  JWT_SECRET: ci-test-secret

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ env.MSSQL_SA_PASSWORD }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $MSSQL_SA_PASSWORD -Q 'SELECT 1' -b"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          DB_HOST: localhost
          DB_USER: sa
          DB_PASSWORD: ${{ env.MSSQL_SA_PASSWORD }}
          DB_NAME: tickets

      - name: Build Docker image - auth
        run: docker build -f services/auth/Dockerfile -t event-ticket-auth:ci .

      - name: Build Docker image - booking
        run: docker build -f services/booking/Dockerfile -t event-ticket-booking:ci .

  release:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.run_number }}
          generate_release_notes: true
