services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      PORT: 3001
      DB_HOST: mssql
      DB_USER: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD}
      DB_NAME: tickets
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3001:3001"
    restart: on-failure
    depends_on:
      mssql:
        condition: service_healthy

  booking:
    build:
      context: .
      dockerfile: services/booking/Dockerfile
    environment:
      PORT: 3002
      DB_HOST: mssql
      DB_USER: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD}
      DB_NAME: tickets
      JWT_SECRET: ${JWT_SECRET}
      AUTH_BASE_URL: http://auth:3001
    ports:
      - "3002:3002"
    restart: on-failure
    depends_on:
      mssql:
        condition: service_healthy
